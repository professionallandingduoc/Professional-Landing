<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Professional Landing - Compartir</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="home.css">
  
  <style>
    /* Estilos específicos para la vista del proyector */
    .qr-section {
      background: rgba(26, 35, 50, 0.95);
      padding: 60px 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 212, 255, 0.2);
      border: 1px solid rgba(0, 212, 255, 0.3);
      text-align: center;
      max-width: 900px;
      margin: 0 auto 50px auto;
    }

    .qr-title {
      color: #00d4ff;
      font-size: 3em;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
      font-weight: bold;
    }

    .qr-instructions {
      font-size: 1.6em;
      color: #e0e0e0;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    /* Contenedor blanco crucial para que la cámara detecte el QR en el salón oscuro */
    .qr-image-wrapper {
      background: #ffffff;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 212, 255, 0.3);
      border: 6px solid #00d4ff;
      transition: transform 0.3s ease;
    }

    .qr-image-wrapper:hover {
      transform: scale(1.02);
    }

    .qr-image {
      width: 100%;
      max-width: 450px; /* Tamaño ideal para ser escaneado desde el fondo del salón */
      height: auto;
      display: block;
    }

    .qr-link {
      display: inline-block;
      margin-top: 40px;
      font-size: 2em;
      color: #ffffff;
      text-decoration: none;
      padding: 15px 40px;
      border: 2px dashed rgba(0, 212, 255, 0.6);
      border-radius: 12px;
      background: rgba(0, 212, 255, 0.1);
      transition: all 0.3s ease;
    }

    .qr-link strong {
      color: #00d4ff;
      letter-spacing: 1px;
    }

    .qr-link:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: #00d4ff;
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
    }

    /* Ajustes responsivos por si el profesor lo abre desde una tablet/notebook pequeña */
    @media (max-width: 768px) {
      .qr-section { padding: 40px 20px; }
      .qr-title { font-size: 2.2em; }
      .qr-instructions { font-size: 1.2em; margin-bottom: 30px; }
      .qr-image { max-width: 300px; }
      .qr-image-wrapper { padding: 20px; border-width: 4px; }
      .qr-link { font-size: 1.3em; padding: 12px 25px; }
    }
  </style>
</head>
<body>

  <div class="logo-header">
    <div class="logo-container">
      <img src="banner.png" alt="Professional Landing Banner" class="banner-image">
    </div>
  </div>

  <nav class="main-nav">
    <a href="index.html" class="nav-button">Inicio</a>
    <a href="test.html" class="nav-button">Cuestionario DISC</a>
    <a href="horarios.html" class="nav-button">Horarios</a>
    <a href="https://forms.gle/EDWFnfTvK8PC7gGW7" target="_blank" class="nav-button">Inscripciones</a>
  </nav>

  <div class="main-container">
    <section class="qr-section">
      <p class="qr-instructions">
        Apunta la cámara de tu teléfono hacia el código QR para acceder al Cuestionario DISC y descubrir tu perfil profesional.
      </p>
      
      <div class="qr-image-wrapper">
        <img src="qr-code.png" alt="Código QR para acceder al Cuestionario DISC" class="qr-image">
      </div>

      <br>
      
    </section>
  </div>

  <div style="text-align: center; margin-top: 20px;">
      <a href="index.html" class="back-link">← Volver al Inicio</a>
    </div>

  <footer style="text-align: center; margin-top: 40px; margin-bottom: 20px; color: #8892b0; font-size: 0.9em;">
    <p>&copy; 2026 Professional Landing</p>
  </footer>

</body>
</html>
